<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💿 Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">

  <!-- ===== COLUNA ESQUERDA ===== -->
  <div class="left-col">

    <!-- Player -->
    <div class="player-card">

      <div class="visualizer">
        <canvas id="vizCanvas"></canvas>
      </div>

      <div class="now-playing">
        <div class="disk" id="disk"><div class="disk-inner"></div></div>
        <div class="info">
          <p class="label">Tocando agora</p>
          <h2 class="song-title"  id="songTitle">—</h2>
          <p class="song-artist" id="songArtist">Selecione uma faixa</p>
        </div>
      </div>

      <div class="progress-area">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill"  id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <div class="times">
          <span id="curTime">0:00</span>
          <span id="totTime">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn"       id="shuffleBtn" title="Aleatório">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41z
                     M14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5z
                     m.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
          </svg>
        </button>
        <button class="ctrl-btn big"   id="prevBtn"    title="Anterior">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <button class="play-btn"       id="playBtn">
          <svg id="playIcon"  width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button class="ctrl-btn big"   id="nextBtn"    title="Próxima">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
          </svg>
        </button>
        <button class="ctrl-btn"       id="repeatBtn"  title="Repetir">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
          </svg>
        </button>
      </div>

      <div class="volume-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="opacity:.5;flex-shrink:0">
          <path d="M7 9v6h4l5 5V4l-5 5H7z"/>
        </svg>
        <input type="range" id="volSlider" min="0" max="100" value="75" />
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="opacity:.5;flex-shrink:0">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05
                   c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71
                   s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <button class="ctrl-btn theme-toggle" id="themeBtn" title="Alternar tema">
          <span class="theme-icon">☀️</span>
        </button>
      </div>

    </div><!-- /player-card -->

    <!-- Playlists -->
    <div class="playlists-card">
      <div class="playlists-header">
        <h3>Minhas Playlists</h3>
        <button class="btn-new-playlist" id="btnNewPlaylist" title="Nova playlist">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
          Nova
        </button>
      </div>

      <div class="playlist-form" id="playlistForm" style="display:none">
        <input type="text" id="playlistNameInput" placeholder="Nome da playlist…" maxlength="40" />
        <div class="playlist-form-btns">
          <button class="btn-confirm" id="btnConfirmPlaylist">Salvar</button>
          <button class="btn-cancel"  id="btnCancelPlaylist">Cancelar</button>
        </div>
      </div>

      <div class="playlists-list" id="playlistsList"></div>
    </div><!-- /playlists-card -->

  </div><!-- /left-col -->

  <!-- ===== COLUNA DIREITA: Biblioteca ===== -->
  <div class="playlist-card">
    <div class="playlist-header">
      <h3>Biblioteca</h3>
      <div class="playlist-actions">
        <label class="btn-upload" title="Adicionar músicas do PC">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
          Adicionar
          <input type="file" id="fileInput" accept="audio/*" multiple style="display:none" />
        </label>
        <button class="ctrl-btn fav-filter-btn" id="favFilterBtn" title="Mostrar favoritas">♡</button>
        <span id="trackCount"></span>
      </div>
    </div>

    <div class="search-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="search-icon">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16
                 c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z
                 m-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar faixa ou artista…" />
    </div>

    <div class="playlist" id="playlist"></div>
  </div><!-- /playlist-card -->

</div><!-- /app -->

<audio id="audioEl" preload="metadata"></audio>
<script src="js/tracks.js"></script>
<script src="js/player.js"></script>
</body>
</html>
